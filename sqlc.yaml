version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/migrations/"
    queries: "db/queries/"
    gen:
      go:
        package: "db"
        out: "db/sqlc/"
        sql_package: "pgx/v5"
        emit_methods_with_db_argument: true
        emit_interface: true
        emit_exact_table_names: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
